<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon-256.png" />
    <title>FreeUltraCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const fallback = 'pencil';
        const supported = new Set([fallback]);
        try {
          const raw =
            localStorage.getItem('freeultracode.appearance.v1') ??
            localStorage.getItem('openworkflow.appearance.v1');
          const parsed = raw ? JSON.parse(raw) : null;
          const storedId =
            parsed && typeof parsed.stylePresetId === 'string'
              ? parsed.stylePresetId
              : fallback;
          const id = supported.has(storedId) ? storedId : fallback;
          document.documentElement.dataset.fucStyle = id;
          document.documentElement.classList.toggle(
            'fuc-style-pencil',
            id === 'pencil',
          );
        } catch {
          document.documentElement.dataset.fucStyle = fallback;
          document.documentElement.classList.add('fuc-style-pencil');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
